name: Android CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: ""
      JAVA_OPTS: ""
      _JAVA_OPTIONS: ""
      JAVA_TOOL_OPTIONS: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create gradle.properties
        run: |
          printf "%s\n" \
            "org.gradle.jvmargs=-Xmx2048m -Xms512m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8" \
            "org.gradle.parallel=true" \
            "org.gradle.caching=true" \
            "org.gradle.configureondemand=false" \
            "android.useAndroidX=true" \
            "android.enableJetifier=true" \
            > gradle.properties

      - name: Verify Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found in repository"
            exit 1
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew --no-daemon assembleDebug --stacktrace

      - name: Run Unit Tests
        run: ./gradlew --no-daemon testDebugUnitTest --stacktrace

      - name: Lint
        run: ./gradlew --no-daemon lintDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/

  android-test:
    runs-on: macos-latest
    needs: build

    env:
      GRADLE_OPTS: ""
      JAVA_OPTS: ""
      _JAVA_OPTIONS: ""
      JAVA_TOOL_OPTIONS: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew --no-daemon connectedDebugAndroidTest --stacktrace

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-reports
          path: app/build/reports/

  code-quality:
    runs-on: ubuntu-latest
    needs: build

    env:
      GRADLE_OPTS: ""
      JAVA_OPTS: ""
      _JAVA_OPTIONS: ""
      JAVA_TOOL_OPTIONS: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Detekt
        run: ./gradlew --no-daemon detekt --stacktrace
        continue-on-error: true

      - name: Ktlint
        run: ./gradlew --no-daemon ktlintCheck --stacktrace
        continue-on-error: true

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-quality
          path: |
            app/build/reports/detekt/
            app/build/reports/ktlint/

  dependency-check:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: ""
      JAVA_OPTS: ""
      _JAVA_OPTIONS: ""
      JAVA_TOOL_OPTIONS: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run dependency check
        run: ./gradlew --no-daemon dependencyCheckAnalyze --stacktrace

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check
          path: app/build/reports/dependency-check/

  deploy:
    runs-on: ubuntu-latest
    needs: [build, android-test]
    if: startsWith(github.ref, 'refs/tags/')

    env:
      GRADLE_OPTS: ""
      JAVA_OPTS: ""
      _JAVA_OPTIONS: ""
      JAVA_TOOL_OPTIONS: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        if: env.KEYSTORE != ''
        run: |
          echo "$KEYSTORE" | base64 -d > keystore.jks
          echo "Keystore file created:"
          ls -la keystore.jks

      - name: Build Release APK
        run: |
          if [ -f keystore.jks ]; then
            echo "Building signed release APK..."
            ./gradlew --no-daemon assembleRelease \
              -PstoreFile=keystore.jks \
              -PstorePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
              -PkeyAlias="${{ secrets.KEY_ALIAS }}" \
              -PkeyPassword="${{ secrets.KEY_PASSWORD }}" \
              --stacktrace
          else
            echo "Building unsigned release APK..."
            ./gradlew --no-daemon assembleRelease --stacktrace
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: ${{ success() }}
        with:
          files: app/build/outputs/apk/release/*.apk
          body: |
            🚀 Android Release

            ### Changes:
            - Automated CI/CD build
            - Signed APK (if keystore provided)

            📦 APK attached below

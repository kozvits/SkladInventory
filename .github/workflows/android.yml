```yaml
name: Android CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: ""
      JAVA_OPTS: ""
      _JAVA_OPTIONS: ""
      JAVA_TOOL_OPTIONS: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: gradle --no-daemon assembleDebug --stacktrace

      - name: Run Unit Tests
        run: gradle --no-daemon testDebugUnitTest --stacktrace

      - name: Lint
        run: gradle --no-daemon lintDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/

  android-test:
    runs-on: macos-latest
    needs: build
    env:
      GRADLE_OPTS: ""
      JAVA_OPTS: ""
      _JAVA_OPTIONS: ""
      JAVA_TOOL_OPTIONS: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 6
          script: gradle --no-daemon connectedDebugAndroidTest --stacktrace

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: app/build/reports/

  code-quality:
    runs-on: ubuntu-latest
    needs: build
    env:
      GRADLE_OPTS: ""
      JAVA_OPTS: ""
      _JAVA_OPTIONS: ""
      JAVA_TOOL_OPTIONS: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Detekt
        run: gradle --no-daemon detekt --stacktrace
        continue-on-error: true

      - name: Ktlint
        run: gradle --no-daemon ktlintCheck --stacktrace
        continue-on-error: true

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality
          path: |
            app/build/reports/detekt/
            app/build/reports/ktlint/

  dependency-check:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: ""
      JAVA_OPTS: ""
      _JAVA_OPTIONS: ""
      JAVA_TOOL_OPTIONS: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run dependency check
        run: gradle --no-daemon dependencyCheckAnalyze --stacktrace

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check
          path: app/build/reports/dependency-check/

  deploy:
    runs-on: ubuntu-latest
    needs: [build, android-test]
    if: startsWith(github.ref, 'refs/tags/')
    env:
      GRADLE_OPTS: ""
      JAVA_OPTS: ""
      _JAVA_OPTIONS: ""
      JAVA_TOOL_OPTIONS: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE != '' }}
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: |
          echo "$KEYSTORE" | base64 -d > keystore.jks
          ls -la keystore.jks

      - name: Build Release APK
        run: |
          if [ -f keystore.jks ]; then
            gradle --no-daemon assembleRelease \
              -PstoreFile=keystore.jks \
              -PstorePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
              -PkeyAlias="${{ secrets.KEY_ALIAS }}" \
              -PkeyPassword="${{ secrets.KEY_PASSWORD }}" \
              --stacktrace
          else
            gradle --no-daemon assembleRelease --stacktrace
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/

      - name: Create GitHub Release
        if: ${{ success() }}
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
          body: |
            🚀 Android Release

            ### Changes:
            - Automated CI/CD build
            - Signed APK (if keystore provided)

            📦 APK attached below
```

name: Android CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # ✅ УБРАН gradle/actions/setup-gradle — он внедряет сломанные JVM-опции
      # ./gradlew сам скачает Gradle из gradle-wrapper.properties

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Clean injected JVM options from gradle.properties
        run: |
          GRADLE_PROPS="$HOME/.gradle/gradle.properties"
          if [ -f "$GRADLE_PROPS" ]; then
            echo "=== Before cleanup ==="
            cat "$GRADLE_PROPS"
            # Удаляем строки с org.gradle.jvmargs, которые содержат -X флаги
            sed -i '/^org\.gradle\.jvmargs/d' "$GRADLE_PROPS"
            echo "=== After cleanup ==="
            cat "$GRADLE_PROPS"
          else
            echo "No gradle.properties found, nothing to clean."
          fi
          # Записываем безопасные JVM args без проблемных флагов
          mkdir -p "$HOME/.gradle"
          echo "org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8" >> "$GRADLE_PROPS"

      - name: Force plugin versions compatible with classpath
        run: |
          python3 - <<'PY'
          import pathlib, re
          REPLACEMENTS = [
              (r"(id\s+['\"]io\.gitlab\.arturbosch\.detekt['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>1.23.0\2"),
              (r"(id\(\s*['\"]io\.gitlab\.arturbosch\.detekt['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>1.23.0\2"),
              (r"(io\.gitlab\.arturbosch\.detekt:detekt-gradle-plugin:)[0-9][^\s'\")}]*", r"\g<1>1.23.0"),
              (r"(id\s+['\"]org\.jlleitschuh\.gradle\.ktlint['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>11.5.0\2"),
              (r"(id\(\s*['\"]org\.jlleitschuh\.gradle\.ktlint['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>11.5.0\2"),
              (r"(org\.jlleitschuh\.gradle:ktlint-gradle:)[0-9][^\s'\")}]*", r"\g<1>11.5.0"),
              (r"(id\s+['\"]org\.owasp\.dependencycheck['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>8.4.0\2"),
              (r"(id\(\s*['\"]org\.owasp\.dependencycheck['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>8.4.0\2"),
              (r"(org\.owasp:dependency-check-gradle:)[0-9][^\s'\")}]*", r"\g<1>8.4.0"),
          ]
          for p in [f for f in pathlib.Path('.').rglob('*') if f.suffix in ('.gradle', '.kts') and f.is_file()]:
              orig = p.read_text(encoding='utf-8', errors='ignore')
              patched = orig
              for pat, repl in REPLACEMENTS:
                  patched = re.sub(pat, repl, patched)
              if patched != orig:
                  p.write_text(patched, encoding='utf-8')
                  print(f"Patched: {p}")
          PY

      - name: Build Debug APK
        run: ./gradlew --no-daemon :app:assembleDebug --stacktrace

      - name: Run Unit Tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest --stacktrace

      - name: Lint
        run: ./gradlew --no-daemon :app:lintDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/

  android-test:
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Clean injected JVM options from gradle.properties
        run: |
          GRADLE_PROPS="$HOME/.gradle/gradle.properties"
          mkdir -p "$HOME/.gradle"
          if [ -f "$GRADLE_PROPS" ]; then
            sed -i '' '/^org\.gradle\.jvmargs/d' "$GRADLE_PROPS" 2>/dev/null || \
            sed -i '/^org\.gradle\.jvmargs/d' "$GRADLE_PROPS"
          fi
          echo "org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8" >> "$GRADLE_PROPS"

      - name: Force plugin versions compatible with classpath
        run: |
          python3 - <<'PY'
          import pathlib, re
          REPLACEMENTS = [
              (r"(id\s+['\"]io\.gitlab\.arturbosch\.detekt['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>1.23.0\2"),
              (r"(id\(\s*['\"]io\.gitlab\.arturbosch\.detekt['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>1.23.0\2"),
              (r"(io\.gitlab\.arturbosch\.detekt:detekt-gradle-plugin:)[0-9][^\s'\")}]*", r"\g<1>1.23.0"),
              (r"(id\s+['\"]org\.jlleitschuh\.gradle\.ktlint['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>11.5.0\2"),
              (r"(id\(\s*['\"]org\.jlleitschuh\.gradle\.ktlint['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>11.5.0\2"),
              (r"(org\.jlleitschuh\.gradle:ktlint-gradle:)[0-9][^\s'\")}]*", r"\g<1>11.5.0"),
              (r"(id\s+['\"]org\.owasp\.dependencycheck['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>8.4.0\2"),
              (r"(id\(\s*['\"]org\.owasp\.dependencycheck['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>8.4.0\2"),
              (r"(org\.owasp:dependency-check-gradle:)[0-9][^\s'\")}]*", r"\g<1>8.4.0"),
          ]
          for p in [f for f in pathlib.Path('.').rglob('*') if f.suffix in ('.gradle', '.kts') and f.is_file()]:
              orig = p.read_text(encoding='utf-8', errors='ignore')
              patched = orig
              for pat, repl in REPLACEMENTS:
                  patched = re.sub(pat, repl, patched)
              if patched != orig:
                  p.write_text(patched, encoding='utf-8')
          PY

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew --no-daemon :app:connectedDebugAndroidTest --stacktrace

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: app/build/reports/

  code-quality:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Clean injected JVM options from gradle.properties
        run: |
          GRADLE_PROPS="$HOME/.gradle/gradle.properties"
          mkdir -p "$HOME/.gradle"
          if [ -f "$GRADLE_PROPS" ]; then
            sed -i '/^org\.gradle\.jvmargs/d' "$GRADLE_PROPS"
          fi
          echo "org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8" >> "$GRADLE_PROPS"

      - name: Force plugin versions compatible with classpath
        run: |
          python3 - <<'PY'
          import pathlib, re
          REPLACEMENTS = [
              (r"(id\s+['\"]io\.gitlab\.arturbosch\.detekt['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>1.23.0\2"),
              (r"(id\(\s*['\"]io\.gitlab\.arturbosch\.detekt['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>1.23.0\2"),
              (r"(io\.gitlab\.arturbosch\.detekt:detekt-gradle-plugin:)[0-9][^\s'\")}]*", r"\g<1>1.23.0"),
              (r"(id\s+['\"]org\.jlleitschuh\.gradle\.ktlint['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>11.5.0\2"),
              (r"(id\(\s*['\"]org\.jlleitschuh\.gradle\.ktlint['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>11.5.0\2"),
              (r"(org\.jlleitschuh\.gradle:ktlint-gradle:)[0-9][^\s'\")}]*", r"\g<1>11.5.0"),
              (r"(id\s+['\"]org\.owasp\.dependencycheck['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>8.4.0\2"),
              (r"(id\(\s*['\"]org\.owasp\.dependencycheck['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>8.4.0\2"),
              (r"(org\.owasp:dependency-check-gradle:)[0-9][^\s'\")}]*", r"\g<1>8.4.0"),
          ]
          for p in [f for f in pathlib.Path('.').rglob('*') if f.suffix in ('.gradle', '.kts') and f.is_file()]:
              orig = p.read_text(encoding='utf-8', errors='ignore')
              patched = orig
              for pat, repl in REPLACEMENTS:
                  patched = re.sub(pat, repl, patched)
              if patched != orig:
                  p.write_text(patched, encoding='utf-8')
          PY

      - name: Detekt
        run: ./gradlew --no-daemon :app:detekt --stacktrace
        continue-on-error: true

      - name: Ktlint
        run: ./gradlew --no-daemon :app:ktlintCheck --stacktrace
        continue-on-error: true

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality
          path: |
            app/build/reports/detekt/
            app/build/reports/ktlint/

  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Clean injected JVM options from gradle.properties
        run: |
          GRADLE_PROPS="$HOME/.gradle/gradle.properties"
          mkdir -p "$HOME/.gradle"
          if [ -f "$GRADLE_PROPS" ]; then
            sed -i '/^org\.gradle\.jvmargs/d' "$GRADLE_PROPS"
          fi
          echo "org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8" >> "$GRADLE_PROPS"

      - name: Force plugin versions compatible with classpath
        run: |
          python3 - <<'PY'
          import pathlib, re
          REPLACEMENTS = [
              (r"(id\s+['\"]io\.gitlab\.arturbosch\.detekt['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>1.23.0\2"),
              (r"(id\(\s*['\"]io\.gitlab\.arturbosch\.detekt['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>1.23.0\2"),
              (r"(io\.gitlab\.arturbosch\.detekt:detekt-gradle-plugin:)[0-9][^\s'\")}]*", r"\g<1>1.23.0"),
              (r"(id\s+['\"]org\.jlleitschuh\.gradle\.ktlint['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>11.5.0\2"),
              (r"(id\(\s*['\"]org\.jlleitschuh\.gradle\.ktlint['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>11.5.0\2"),
              (r"(org\.jlleitschuh\.gradle:ktlint-gradle:)[0-9][^\s'\")}]*", r"\g<1>11.5.0"),
              (r"(id\s+['\"]org\.owasp\.dependencycheck['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>8.4.0\2"),
              (r"(id\(\s*['\"]org\.owasp\.dependencycheck['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>8.4.0\2"),
              (r"(org\.owasp:dependency-check-gradle:)[0-9][^\s'\")}]*", r"\g<1>8.4.0"),
          ]
          for p in [f for f in pathlib.Path('.').rglob('*') if f.suffix in ('.gradle', '.kts') and f.is_file()]:
              orig = p.read_text(encoding='utf-8', errors='ignore')
              patched = orig
              for pat, repl in REPLACEMENTS:
                  patched = re.sub(pat, repl, patched)
              if patched != orig:
                  p.write_text(patched, encoding='utf-8')
          PY

      - name: Run dependency check
        run: ./gradlew --no-daemon :app:dependencyCheckAnalyze --stacktrace
        continue-on-error: true

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check
          path: app/build/reports/dependency-check/

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - android-test
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Clean injected JVM options from gradle.properties
        run: |
          GRADLE_PROPS="$HOME/.gradle/gradle.properties"
          mkdir -p "$HOME/.gradle"
          if [ -f "$GRADLE_PROPS" ]; then
            sed -i '/^org\.gradle\.jvmargs/d' "$GRADLE_PROPS"
          fi
          echo "org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8" >> "$GRADLE_PROPS"

      - name: Force plugin versions compatible with classpath
        run: |
          python3 - <<'PY'
          import pathlib, re
          REPLACEMENTS = [
              (r"(id\s+['\"]io\.gitlab\.arturbosch\.detekt['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>1.23.0\2"),
              (r"(id\(\s*['\"]io\.gitlab\.arturbosch\.detekt['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>1.23.0\2"),
              (r"(io\.gitlab\.arturbosch\.detekt:detekt-gradle-plugin:)[0-9][^\s'\")}]*", r"\g<1>1.23.0"),
              (r"(id\s+['\"]org\.jlleitschuh\.gradle\.ktlint['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>11.5.0\2"),
              (r"(id\(\s*['\"]org\.jlleitschuh\.gradle\.ktlint['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>11.5.0\2"),
              (r"(org\.jlleitschuh\.gradle:ktlint-gradle:)[0-9][^\s'\")}]*", r"\g<1>11.5.0"),
              (r"(id\s+['\"]org\.owasp\.dependencycheck['\"]\s+version\s+['\"])[^'\"]+(['\"])", r"\g<1>8.4.0\2"),
              (r"(id\(\s*['\"]org\.owasp\.dependencycheck['\"]\s*\)\s*version\s*['\"])[^'\"]+(['\"])", r"\g<1>8.4.0\2"),
              (r"(org\.owasp:dependency-check-gradle:)[0-9][^\s'\")}]*", r"\g<1>8.4.0"),
          ]
          for p in [f for f in pathlib.Path('.').rglob('*') if f.suffix in ('.gradle', '.kts') and f.is_file()]:
              orig = p.read_text(encoding='utf-8', errors='ignore')
              patched = orig
              for pat, repl in REPLACEMENTS:
                  patched = re.sub(pat, repl, patched)
              if patched != orig:
                  p.write_text(patched, encoding='utf-8')
          PY

      - name: Decode keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: |
          if [ -n "$KEYSTORE" ]; then
            echo "$KEYSTORE" | base64 -d > keystore.jks
            echo "KEYSTORE_PRESENT=true" >> "$GITHUB_ENV"
            ls -la keystore.jks
          else
            echo "No keystore secret provided; will build unsigned release."
            echo "KEYSTORE_PRESENT=false" >> "$GITHUB_ENV"
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "$KEYSTORE_PRESENT" = "true" ]; then
            ./gradlew --no-daemon :app:assembleRelease \
              -PstoreFile=keystore.jks \
              -PstorePassword="$KEYSTORE_PASSWORD" \
              -PkeyAlias="$KEY_ALIAS" \
              -PkeyPassword="$KEY_PASSWORD" \
              --stacktrace
          else
            ./gradlew --no-daemon :app:assembleRelease --stacktrace
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
          body: |
            Android Release

            Changes:
            - Automated CI/CD build
            - Signed APK if keystore is provided

            APK attached below.
